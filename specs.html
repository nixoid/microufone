<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Specs &mdash; microufone</title>
<style>
  :root {
    --bg: #0b0d12;
    --bg-elev: #141821;
    --border: #262b38;
    --text: #e8ecf4;
    --text-dim: #9aa3b5;
    --text-mute: #6a7388;
    --accent: #ffb968;
    --accent-soft: rgba(255, 185, 104, 0.18);
    --nav-h: 48px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    padding-top: var(--nav-h);
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(255, 185, 104, 0.07), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, rgba(110, 231, 168, 0.05), transparent 60%),
      var(--bg);
  }
  .site-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    height: var(--nav-h);
    background: rgba(20, 24, 33, 0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  .site-nav-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 100%;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .site-nav .brand {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .site-nav .brand:hover { color: var(--accent); }
  .site-nav-links {
    display: flex;
    gap: 8px;
  }
  .site-nav-links a {
    font-size: 13px;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .site-nav-links a:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.04);
  }
  .site-nav-links a.active {
    color: var(--accent);
    background: var(--accent-soft);
  }
  .spec-page {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 32px 64px;
  }
  .spec-page > header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .spec-page > header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .spec-page > header p {
    margin: 8px 0 0;
    color: var(--text-dim);
    font-size: 14px;
  }
  .spec-status {
    color: var(--text-dim);
    font-size: 14px;
    padding: 24px 0;
  }
  .spec-status.error { color: #ff8a80; }
  .spec-body {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-dim);
  }
  .spec-body h1, .spec-body h2, .spec-body h3, .spec-body h4 {
    color: var(--text);
    line-height: 1.3;
    margin: 1.6em 0 0.6em;
  }
  .spec-body h1 { font-size: 1.75em; margin-top: 0; }
  .spec-body h2 { font-size: 1.35em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  .spec-body h3 { font-size: 1.12em; }
  .spec-body p { margin: 0.75em 0; }
  .spec-body ul, .spec-body ol {
    margin: 0.75em 0;
    padding-left: 1.5em;
  }
  .spec-body li + li { margin-top: 0.35em; }
  .spec-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent-soft);
  }
  .spec-body a:hover { border-bottom-style: solid; }
  .spec-body code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 0.88em;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    color: var(--text);
  }
  .spec-body pre {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 1em 0;
  }
  .spec-body pre code {
    background: none;
    border: none;
    padding: 0;
  }
  .spec-body blockquote {
    margin: 1em 0;
    padding: 0.5em 0 0.5em 1em;
    border-left: 3px solid var(--accent-soft);
    color: var(--text-mute);
  }
  .spec-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
    font-size: 14px;
  }
  .spec-body th, .spec-body td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .spec-body th {
    background: var(--bg-elev);
    color: var(--text);
  }
  .spec-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2em 0;
  }
  .spec-body strong { color: var(--text); }
  @media (max-width: 700px) {
    .site-nav-inner { padding: 0 16px; }
    .spec-page { padding: 24px 16px 48px; }
  }
</style>
</head>
<body>
  <nav class="site-nav" aria-label="Site">
    <div class="site-nav-inner">
      <a class="brand" href="renders.html">microufone</a>
      <div class="site-nav-links">
        <a href="renders.html">Renders</a>
        <a href="specs.html" class="active">Specs</a>
      </div>
    </div>
  </nav>

  <div class="spec-page">
    <header>
      <h1>Specification</h1>
      <p>Live from <code>specs.md</code> &mdash; edit the file and push to update.</p>
    </header>
    <div id="status" class="spec-status">Loading specs&hellip;</div>
    <article id="content" class="spec-body" hidden></article>
  </div>

  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked@15.0.7/lib/marked.esm.js';

    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');

    try {
      const res = await fetch('specs.md');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md = await res.text();
      contentEl.innerHTML = marked.parse(md);
      statusEl.hidden = true;
      contentEl.hidden = false;
    } catch (err) {
      statusEl.textContent = `Failed to load specs.md: ${err.message}`;
      statusEl.classList.add('error');
    }
  </script>
</body>
</html>
